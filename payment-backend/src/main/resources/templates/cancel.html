<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Canceled</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #8B2E25; /* Your Brand Red */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        h1 { color: #d9534f; margin-top: 0; } /* Error Red */
        p { color: #555; margin-bottom: 30px; }

        .btn {
            background-color: #F4C430; /* Your Brand Gold */
            color: #5a1a15;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card">
    <h1>Payment Canceled</h1>
    <p>You have not been charged. <br> Do you want to try again?</p>

    <a href="/" class="btn">Return to Menu</a>
</div>

</body>
</html>
